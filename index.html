<!DOCTYPE html>
<html>
<head>
  <title>Wisdom Digital Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background: orange;
      padding: 15px;
      color: white;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product h3 {
      margin: 5px 0;
    }

    .price {
      color: green;
      font-weight: bold;
      margin: 8px 0;
    }

    button {
      background: orange;
      color: white;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: darkorange;
    }

    .checkout {
      background: white;
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .whatsapp-btn {
      background: green;
      margin-top: 10px;
    }

    .whatsapp-btn:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

<header>Wisdom Digital Store</header>

<div class="container">

<div class="products">

  <div class="product">
    <h3>🇺🇸 USA Number</h3>
    <div class="price">₦5,000</div>
    <button onclick="addToCart(5000, 'USA Number')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>🇬🇧 UK Number</h3>
    <div class="price">₦5,000</div>
    <button onclick="addToCart(5000, 'UK Number')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>🇵🇭 Philippines</h3>
    <div class="price">₦4,000</div>
    <button onclick="addToCart(4000, 'Philippines Number')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>🇮🇩 Indonesia</h3>
    <div class="price">₦4,000</div>
    <button onclick="addToCart(4000, 'Indonesia Number')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>🇸🇦 Saudi Arabia</h3>
    <div class="price">₦10,000</div>
    <button onclick="addToCart(10000, 'Saudi Number')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>🌍 Other Countries</h3>
    <div class="price">₦7,000</div>
    <button onclick="addToCart(7000, 'Other Country Number')">Add to Cart</button>
  </div>

</div>

<div class="checkout">
  <h2>Checkout</h2>
  <p><strong>Items:</strong></p>
  <ul id="cartList"></ul>

  <p><strong>Total: ₦<span id="total">0</span></strong></p>

  <p><strong>Payment Method:</strong> Opay</p>
  <p><strong>Account Name:</strong> Wisdom Tochukwu Nwabugwu</p>
  <p><strong>Account Number:</strong> 7030608002</p>

  <a href="https://wa.me/2349157054608?text=Hello%20I%20have%20made%20payment.%20Here%20is%20my%20proof." target="_blank">
    <button class="whatsapp-btn">Send Proof on WhatsApp</button>
  </a>
</div>

</div>

<script>
  let total = 0;
  let cart = [];

  function addToCart(price, name) {
    total += price;
    cart.push(name);

    document.getElementById("total").innerText = total;

    let cartList = document.getElementById("cartList");
    cartList.innerHTML = '';
    cart.forEach(item => {
      let li = document.createElement("li");
      li.textContent = item;
      cartList.appendChild(li);
    });
  }
</script>

</body>
</html>
