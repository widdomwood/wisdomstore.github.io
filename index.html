<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisdom Store</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background:#f5f5f5; }
  .product { border:1px solid #ccc; padding:10px; margin:10px; display:inline-block; width:200px; background:white; border-radius:8px; text-align:center; }
  .product img { width:50px; height:30px; }
  .cart { margin-top:20px; }
  button { padding:5px 10px; margin-top:5px; cursor:pointer; }
  .payment-info { margin:10px 0; padding:10px; border:1px dashed #888; background:#fff; border-radius:5px; }
</style>
</head>
<body>

<h1>Wisdom Store - International Numbers</h1>

<div id="products"></div>

<h2>Cart</h2>
<div class="cart" id="cart"></div>
<h3>Total: ₦<span id="total">0</span></h3>

<h3>Choose Payment Method</h3>
<select id="payment">
  <option value="Opay">Opay</option>
  <option value="Palmpay">Palmpay</option>
  <option value="Paystack">Paystack</option>
</select>

<div class="payment-info">
  <strong>Account Number:</strong> 7030608002<br>
  <strong>Name:</strong> Wisdom Tochukwu Nwabugwu<br>
  <strong>Payment Method:</strong> Will use the one selected above
</div>

<button onclick="paymentMade()">I Have Made Payment</button>

<script>
const products = [
  {country:"USA", price:5000, flag:"https://flagcdn.com/us.svg"},
  {country:"Canada", price:5000, flag:"https://flagcdn.com/ca.svg"},
  {country:"Cuba", price:5000, flag:"https://flagcdn.com/cu.svg"},
  {country:"Brazil", price:5000, flag:"https://flagcdn.com/br.svg"},
  {country:"Ecuador", price:5000, flag:"https://flagcdn.com/ec.svg"},
  {country:"India", price:4000, flag:"https://flagcdn.com/in.svg"},
  {country:"Pakistan", price:4000, flag:"https://flagcdn.com/pk.svg"},
  {country:"Philippines", price:4000, flag:"https://flagcdn.com/ph.svg"},
  {country:"Indonesia", price:4000, flag:"https://flagcdn.com/id.svg"},
  {country:"Kenya", price:5000, flag:"https://flagcdn.com/ke.svg"},
  {country:"Uganda", price:5000, flag:"https://flagcdn.com/ug.svg"},
  {country:"Burkina Faso", price:4000, flag:"https://flagcdn.com/bf.svg"},
  {country:"Mali", price:5000, flag:"https://flagcdn.com/ml.svg"},
  {country:"Cameroon", price:5000, flag:"https://flagcdn.com/cm.svg"},
  {country:"Nigeria", price:3000, flag:"https://flagcdn.com/ng.svg"},
  {country:"Ghana", price:5000, flag:"https://flagcdn.com/gh.svg"},
  {country:"Germany", price:5000, flag:"https://flagcdn.com/de.svg"},
  {country:"Italy", price:5000, flag:"https://flagcdn.com/it.svg"},
  {country:"France", price:5000, flag:"https://flagcdn.com/fr.svg"},
  {country:"Mexico", price:5000, flag:"https://flagcdn.com/mx.svg"},
  {country:"Peru", price:5000, flag:"https://flagcdn.com/pe.svg"},
  {country:"Russia", price:5000, flag:"https://flagcdn.com/ru.svg"},
  {country:"Australia", price:5000, flag:"https://flagcdn.com/au.svg"},
  {country:"Greece", price:5000, flag:"https://flagcdn.com/gr.svg"}
];

const productsDiv = document.getElementById("products");
const cartDiv = document.getElementById("cart");
let cart = [];

function renderProducts() {
  productsDiv.innerHTML = "";
  products.forEach((p, index)=>{
    productsDiv.innerHTML += `
      <div class="product">
        <img src="${p.flag}" alt="${p.country} flag">
        <h3>${p.country}</h3>
        <p>₦${p.price}</p>
        <input type="number" id="qty${index}" value="1" min="1" style="width:50px;">
        <br>
        <button onclick="addToCart(${index})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(index){
  const qty = parseInt(document.getElementById("qty"+index).value);
  const item = products[index];
  const existing = cart.find(c=>c.country===item.country);
  if(existing){
    existing.qty += qty;
  } else {
    cart.push({country:item.country, price:item.price, qty: qty});
  }
  renderCart();
}

function removeFromCart(country){
  cart = cart.filter(c=>c.country !== country);
  renderCart();
}

function renderCart(){
  cartDiv.innerHTML = "";
  let total = 0;
  cart.forEach(c=>{
    total += c.price * c.qty;
    cartDiv.innerHTML += `<p>${c.country} x ${c.qty} = ₦${c.price*c.qty} <button onclick="removeFromCart('${c.country}')">Remove</button></p>`;
  });
  document.getElementById("total").innerText = total;
}

function paymentMade(){
  if(cart.length===0){
    alert("Your cart is empty!");
    return;
  }
  const paymentMethod = document.getElementById("payment").value;
  const total = document.getElementById("total").innerText;
  const message = `Hello, I have made payment for my order via ${paymentMethod}.\n\nAccount: 7030608002 (${paymentMethod})\nName: Wisdom Tochukwu Nwabugwu\nTotal: ₦${total}`;
  const url = "https://wa.me/2349157054608?text=" + encodeURIComponent(message);
  window.location.href = url;
}

renderProducts();
</script>

</body>
</html>
